<div class="info newsletter-callout">
    <h2>Put in your email to hear from me.</h2>
    <p>
        I send out an occasional newsletter with new posts, side projects, and
        the odd half-formed thought. No tracking, no marketing fluff.
        Unsubscribe at any time.
    </p>
    <div id="newsletter-subscription">
        <form
            id="newsletter-form"
            action="https://newsletter.corrode.dev/subscribe"
            method="post"
        >
            <label for="tlemail" class="newsletter-visually-hidden"
                >Email</label
            >
            <input
                id="tlemail"
                type="email"
                name="email"
                placeholder="mail@example.com"
                required
            />
            <!-- honeypot: hidden from humans, irresistible to bots -->
            <input
                type="text"
                name="hpfield"
                class="newsletter-hpfield"
                tabindex="-1"
                autocomplete="off"
            />
            <button type="submit" id="newsletter-submit">
                <span id="newsletter-button-text">Subscribe</span>
                <span
                    id="newsletter-spinner"
                    class="newsletter-spinner"
                    style="display: none"
                    aria-hidden="true"
                ></span>
                <span id="newsletter-button-loading" style="display: none">
                    Subscribing…
                </span>
            </button>
            <p id="newsletter-status" role="status" aria-live="polite"></p>
        </form>
    </div>
</div>

<style>
    .newsletter-callout form {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
    }
    .newsletter-callout input[type="email"] {
        flex: 1 1 220px;
        min-width: 0;
        padding: 10px 12px;
        font: inherit;
        font-size: 0.95em;
        color: var(--text-color);
        background: var(--background);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
    }
    .newsletter-callout input[type="email"]:focus {
        outline: none;
        border-color: var(--accent-color);
    }
    .newsletter-callout button {
        padding: 10px 18px;
        font: inherit;
        font-size: 0.95em;
        color: #fff;
        background: var(--accent-color);
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: opacity var(--transition);
    }
    .newsletter-callout button:hover:not(:disabled) {
        opacity: 0.9;
    }
    .newsletter-callout button:disabled {
        cursor: progress;
        opacity: 0.8;
    }
    .newsletter-callout #newsletter-status:empty {
        display: none;
    }
    .newsletter-callout #newsletter-status,
    .newsletter-callout .newsletter-success {
        width: 100%;
        margin: 8px 0 0;
        font-size: 0.9em;
        color: var(--meta-color);
    }
    .newsletter-callout .newsletter-visually-hidden {
        position: absolute !important;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
        border: 0;
        padding: 0;
        margin: -1px;
    }
    .newsletter-callout .newsletter-hpfield {
        display: none;
    }
    @keyframes newsletter-spin {
        to {
            transform: rotate(360deg);
        }
    }
    .newsletter-callout .newsletter-spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        margin-right: 8px;
        vertical-align: -2px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: newsletter-spin 0.8s linear infinite;
    }
</style>

<script>
    (function () {
        const container = document.getElementById("newsletter-subscription");
        const form = document.getElementById("newsletter-form");
        const status = document.getElementById("newsletter-status");
        const submitBtn = document.getElementById("newsletter-submit");
        const buttonText = document.getElementById("newsletter-button-text");
        const buttonLoading = document.getElementById(
            "newsletter-button-loading",
        );
        const spinner = document.getElementById("newsletter-spinner");
        if (!container || !form || !status || !submitBtn) return;

        const setLoading = (loading) => {
            submitBtn.disabled = loading;
            buttonText.style.display = loading ? "none" : "";
            buttonLoading.style.display = loading ? "" : "none";
            spinner.style.display = loading ? "inline-block" : "none";
        };

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            status.textContent = "";
            setLoading(true);
            try {
                const res = await fetch(form.action, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                    },
                    body: new URLSearchParams(new FormData(form)),
                });
                const text = (await res.text()).trim();
                if (res.ok) {
                    const message =
                        text && text !== "Thank you for subscribing"
                            ? text
                            : "🎉 You're in! Check your inbox to confirm.";
                    const p = document.createElement("p");
                    p.className = "newsletter-success";
                    p.setAttribute("role", "status");
                    p.setAttribute("aria-live", "polite");
                    p.textContent = message;
                    container.replaceChildren(p);
                } else {
                    status.textContent =
                        text ||
                        "There was a problem with your subscription. Please try again later.";
                    setLoading(false);
                }
            } catch (err) {
                status.textContent =
                    "There was a problem with your subscription. Please try again later.";
                setLoading(false);
            }
        });
    })();
</script>
